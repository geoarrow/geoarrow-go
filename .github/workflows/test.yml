name: Test

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                go-version: ["1.24"]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ matrix.go-version }}

            - name: Test
              run: go test -v -race ./...
              env:
                  GONOSUMCHECK: "*"
                  GONOSUMDB: "*"

            - name: Benchmark
              run: go test -bench=. -benchmem -run=^$ ./...
              env:
                  GONOSUMCHECK: "*"
                  GONOSUMDB: "*"
